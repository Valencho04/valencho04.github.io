<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo 3v3 - GG, No hay equipo</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff9800; --text: #fff; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Secciones */
        .section { margin-bottom: 40px; padding: 20px; background: var(--card); border-radius: 8px; }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        /* Tarjetas Informativas */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .card { background: #333; padding: 15px; border-radius: 5px; text-align: center; }
        
        /* Bracket simple */
        .match { border: 1px solid #444; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .team-name { font-weight: bold; color: var(--accent); }
        
        /* Mapas */
        .map-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .map-card { width: 120px; text-align: center; font-size: 12px; }
        .map-card img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <header id="header">Cargando cabecera...</header>
        
        <section class="section">
            <h2>Información General</h2>
            <div id="info-cards" class="info-grid"></div>
        </section>

        <section class="section">
            <h2>Bracket del Torneo</h2>
            <div id="bracket"></div>
        </section>

        <section class="section">
            <h2>Mapas Disponibles</h2>
            <div id="mapas-container" class="map-grid"></div>
        </section>
    </div>

    <script>
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // 1. Render Cabecera
                document.getElementById('header').innerHTML = `<h1>${data.torneo.nombre}</h1><p>${data.torneo.subtítulo}</p>`;

                // 2. Render Info Cards
                const cardsContainer = document.getElementById('info-cards');
                data["tarjetas informativas"].forEach(item => {
                    const label = item.label || item.etiqueta;
                    const value = item.value || item.valor;
                    cardsContainer.innerHTML += `<div class="card"><strong>${label}</strong><br>${value}</div>`;
                });

                // 3. Render Bracket (Accesorio)
                const bracket = document.getElementById('bracket');
                data.accesorio.rondas.forEach(ronda => {
                    bracket.innerHTML += `<h3>${ronda.nombre}</h3>`;
                    ronda.partidos.forEach(p => {
                        const t1 = p.team1 ? p.team1.name : "Por definir";
                        const t2 = p.team2 ? p.team2.name : "Por definir";
                        bracket.innerHTML += `<div class="match">
                            <span class="team-name">${t1}</span> vs <span class="team-name">${t2}</span>
                        </div>`;
                    });
                });

                // 4. Render Mapas
                const mapas = document.getElementById('mapas-container');
                data.mapas.forEach(m => {
                    const nombre = m.nombre || m.name;
                    const imagen = m.imagen || m.image;
                    mapas.innerHTML += `<div class="map-card"><img src="${imagen}" alt="${nombre}"><br>${nombre}</div>`;
                });

            } catch (err) {
                console.error("Error al renderizar:", err);
                document.body.innerHTML = "<h1>Error al cargar el torneo</h1><p>Revisa la consola (F12) o asegúrate que el archivo data.json esté subido.</p>";
            }
        }

        init();
    </script>
</body>
</html>
